<app-navbar-administrador></app-navbar-administrador>

<div class="page-wrapper">
  <div class="card">

    <h2 class="card-title">Cadastro de Produto</h2>

    <form (ngSubmit)="salvar()">

      <div class="form-grid">

        <div class="form-group full">
          <label>Nome do Produto</label>
          <input
            type="text"
            [(ngModel)]="name"
            name="name"
            required
            autocomplete="off">
        </div>

        <div class="form-group">
          <label>Categoria</label>

          <div class="custom-select" [class.open]="dropdownAberto">
            <button
              type="button"
              class="custom-select__trigger"
              (click)="toggleDropdown()">
              {{ categoriaSelecionada || 'Selecione uma categoria' }}
            </button>

            <ul *ngIf="dropdownAberto" class="custom-select__list">
              <li
                *ngFor="let cat of categorias"
                (click)="selecionarCategoria(cat)">
                {{ cat }}
              </li>
            </ul>
          </div>
        </div>

        <div class="form-group full">
          <label>Imagem do Produto</label>

          <div
            class="upload-box"
            (dragover)="onDragOver($event)"
            (drop)="onDrop($event)">

            <input
              type="file"
              accept="image/*"
              (change)="onFileSelected($event)"
              hidden
              #fileInput>

            <button
              type="button"
              class="btn secondary"
              (click)="fileInput.click()">
              Selecionar Imagem
            </button>

            <p *ngIf="!previewImagem">
              Arraste a imagem aqui ou clique para selecionar
            </p>

            <img
              *ngIf="previewImagem"
              [src]="previewImagem"
              class="preview-img"
              loading="lazy"
              decoding="async">
          </div>
        </div>

      </div>

      <div class="button-group">
        <button
          type="button"
          class="btn secondary"
          [routerLink]="['/products']">
          Cancelar
        </button>

        <button type="submit" class="btn primary">
          Salvar Produto
        </button>
      </div>

    </form>
  </div>
</div>
