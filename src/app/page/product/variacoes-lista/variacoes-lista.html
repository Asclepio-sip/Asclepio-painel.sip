<app-navbar-administrador></app-navbar-administrador>
<app-sidebar></app-sidebar>

<div class="page-wrapper">
  <div class="card">
    <h2 class="title">Variações</h2>
  </div>

  <div class="product-table">
    <div class="produtos-header">
      <div>Imagem</div>
      <div>Produto</div>
      <div>Categoria</div>
      <div>Variações</div>
      <div>Ações</div>
    </div>

    <div class="produtos-row" *ngFor="let p of produtos">
      <div class="col-image">
        <img [src]="'data:image/png;base64,' + p.imagemBase64">
      </div>

      <div class="col-name">{{ p.name }}</div>
      <div>{{ p.categoria?.nomeCategoria || p.categoriaNome }}</div>
      <div>{{ p.variacoes.length || 0 }}</div>
      <div>
        <button
          class="btn primary"
          type="button"
          [routerLink]="['/products', p.id, 'variacoes']">
          Abrir
        </button>
      </div>
    </div>
  </div>

  <div class="pagination">
    <button
      class="btn-page"
      type="button"
      (click)="paginaAnterior()"
      [disabled]="paginaAtual === 0">
      Anterior
    </button>

    <span class="page-info">
      Página {{ paginaAtual + 1 }} de {{ totalPaginas || 1 }}
    </span>

    <button
      class="btn-page"
      type="button"
      (click)="proximaPagina()"
      [disabled]="paginaAtual >= totalPaginas - 1">
      Próxima
    </button>
  </div>
</div>
