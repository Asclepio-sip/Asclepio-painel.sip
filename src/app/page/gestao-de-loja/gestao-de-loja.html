<div class="gestao-container">

  <section class="stats-grid" aria-label="Resumo de lojas">
    <article class="stat-card stat-total">
      <span class="stat-label">Limite de loja</span>
      <strong>{{ totalLojas }}</strong>
      <p>Lojas cadastradas no sistema.</p>
    </article>

    <article class="stat-card stat-entrega">
      <span class="stat-label">Lojas no sistema</span>
      <strong>{{ totalEntrega }}</strong>
      <p>Lojas com atendimento por entrega.</p>
    </article>

    <article class="stat-card stat-retirada">
      <span class="stat-label">Lojas ativas</span>
      <strong>{{ totalRetirada }}</strong>
      <p>Lojas com retirada presencial.</p>
    </article>

    <article class="stat-card stat-ambos">
      <span class="stat-label">Lojas inativas</span>
      <strong>{{ totalAmbos }}</strong>
      <p>Lojas com entrega e retirada.</p>
    </article>
  </section>

  <!-- Cabecalho -->
  <div class="page-header">
    <div class="header-left">
      <p class="breadcrumb">ADMIN / GESTÃO / <span>LOJA</span></p>
      <h1 class="page-title">Gestão</h1>
    </div>
    <div class="header-actions">
      <div class="search-box">
        <svg width="15" height="15" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/>
        </svg>
        <input type="text" placeholder="Pesquisar loja..." (input)="onSearch($event.target.value)" />
      </div>
      <button type="button" class="btn-secondary" [routerLink]="['/add-bairro']">
        <svg width="15" height="15" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0zM15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Novo Bairro
      </button>
      <button type="button" class="btn-primary" [routerLink]="['/addloja']">
        <svg width="15" height="15" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Nova Loja
      </button>
    </div>
  </div>

  <!-- Lista de lojas -->
  <app-lista-de-loja></app-lista-de-loja>

</div>
