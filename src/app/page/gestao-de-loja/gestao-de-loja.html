<div class="gestao-container">

  <!-- Cabecalho -->
  <div class="page-header">
    <div class="header-left">
      <p class="breadcrumb">ADMIN / <span>GESTAO DE LOJA</span></p>
      <h1 class="page-title">Gestao de Lojas</h1>
    </div>
    <div class="header-actions">
      <div class="search-box">
        <svg width="15" height="15" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/>
        </svg>
        <input type="text" placeholder="Pesquisar loja..." (input)="onSearch($event.target.value)" />
      </div>
      <button type="button" class="btn-secondary" [routerLink]="['/add-bairro']">
        <svg width="15" height="15" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0zM15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Novo Bairro
      </button>
      <button type="button" class="btn-primary" [routerLink]="['/addloja']">
        <svg width="15" height="15" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Nova Loja
      </button>
    </div>
  </div>

  <!-- Lista de lojas -->
  <app-lista-de-loja></app-lista-de-loja>

</div>
