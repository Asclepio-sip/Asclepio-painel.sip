<app-add-usuario (usuarioCriado)="carregarUsuarios()"></app-add-usuario>
<app-sidebar></app-sidebar>

<div class="admin-users-container">
  <div class="table-wrapper">
    <table class="user-table">
      <thead>
        <tr>
          <th>Login</th>
          <th>Role</th>
          <th>Permissoes</th>
          <th>Acoes</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let user of users" [class.editing]="editUserId === user.id">
          <td>
            <div class="user-info">
              <div class="user-avatar">{{ user.login.charAt(0).toUpperCase() }}</div>
              <span>{{ user.login }}</span>
            </div>
          </td>
          <td>
            <span class="role-badge">
              {{ getUserRoleName(user) }}
            </span>
          </td>
          <td>
            <span class="permission-list">
              {{ getUserPermissionNames(user) }}
            </span>
          </td>
          <td>
            <button class="btn-edit" type="button" (click)="editar(user)">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
              Editar
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="loading" class="empty-state">
      <p>Carregando usuarios...</p>
    </div>

    <div *ngIf="!loading && users.length === 0" class="empty-state">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
      <p>Nenhum usuario cadastrado</p>
    </div>
  </div>

  <div *ngIf="editUserId" class="modal-overlay" (click)="cancelar()">
    <div class="edit-modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Editar Usuario</h3>
        <button class="btn-close" type="button" (click)="cancelar()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label for="edit-login">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Login
          </label>
          <input
            id="edit-login"
            type="text"
            [(ngModel)]="editLogin"
            placeholder="Digite o login"
          />
        </div>

        <div class="form-group">
          <label for="edit-password">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Nova senha
          </label>
          <input
            id="edit-password"
            type="password"
            [(ngModel)]="editPassword"
            placeholder="Deixe em branco para nao alterar"
          />
        </div>

        <div class="form-group">
          <label for="edit-role">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            Role
          </label>
          <select id="edit-role" [(ngModel)]="editRoleId" (ngModelChange)="onEditRoleChange()">
            <option value="">Selecione uma role</option>
            <option *ngFor="let role of roles" [value]="role.id">
              {{ role.nome }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 12l2 2 4-4"></path>
              <path d="M21 12c.552 0 1-.448 1-1V5c0-.552-.448-1-1-1H3c-.552 0-1 .448-1 1v6c0 .552.448 1 1 1"></path>
              <path d="M3 12v7c0 .552.448 1 1 1h16c.552 0 1-.448 1-1v-7"></path>
            </svg>
            Permissoes
          </label>

          <div class="permission-options">
            <label *ngFor="let permission of permissions" class="permission-option">
              <input
                type="checkbox"
                [checked]="isEditPermissionSelected(permission.id)"
                [disabled]="isEditRolePermission(permission.id)"
                (change)="toggleEditPermission(permission.id, $event)"
              />
              <span>
                <strong>{{ permission.nome }}</strong>
                <small>
                  {{ isEditRolePermission(permission.id) ? 'Herdada da role' : permission.descricao }}
                </small>
              </span>
            </label>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" type="button" (click)="cancelar()">Cancelar</button>
        <button class="btn-save" type="button" (click)="salvar()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Salvar Alteracoes
        </button>
      </div>
    </div>
  </div>
</div>
